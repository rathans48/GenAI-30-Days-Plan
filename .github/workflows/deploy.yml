name: Continuous Integration & Deployment Pipeline

# Trigger conditions: Run the workflow automatically when code is pushed to main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code repository into the runner environment
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # Step 2: Establish Python sandbox environment to validate syntax integrity
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-level: '3.11'

    # Step 3: Verify packages build correctly before initializing remote deployment
    - name: Install Linting & Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run a lightweight static code syntax check
    - name: Lint Code with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # Step 5: Securely fire the Deploy Hook to instruct Render to build the live container
    - name: Trigger Remote Container Rebuild on Render
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"